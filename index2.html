<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TC Audio Productions | Hero Variant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0a0a0a;
    color: #f5f0e8;
    font: 16px/1.6 Inter, system-ui, sans-serif;
    padding: 24px;
    text-align: center;
  }

  a {
    color: #c8a050;
  }
</style>
</head>
<body>
  <main>
    <p>Loading hero variant...</p>
    <p>If this page does not load, <a href="/">open the main TC Audio page</a>.</p>
  </main>
  <script>
    (async function () {
      try {
        const response = await fetch('./index.html', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Failed to load base page');
        }

        let html = await response.text();

        html = html.replace(
          'url("./assets/tommy-hero-bg.jpg");',
          'url("./assets/tommy-photo-01.jpg");'
        );

        html = html.replace(
          '<title>TC Audio Productions</title>',
          '<title>TC Audio Productions | Hero Variant</title><meta name="robots" content="noindex">'
        );

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
      }
    }());
  </script>
</body>
</html>
